version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: smd-backend:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
    volumes:
      # data_loader.py resolves ../../data/*.csv from /app/data/ → /data/ in container
      - ./data/cupos.csv:/data/cupos.csv:ro
      - ./data/cupos_cobertura.csv:/data/cupos_cobertura.csv:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: smd-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
